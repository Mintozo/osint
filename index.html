---
layout: default
title: OSINT Marketplace
---

<div class="hero">
  <h1>OSINT Marketplace Directory</h1>
  <p>Dark, searchable, card-based OSINT tool directory.</p>
</div>

<div class="grid">
  {% for tool in site.tools %}
  <div class="card">
    <h3><a href="{{ tool.url }}" target="_blank">{{ tool.name }}</a></h3>
    <p>{{ tool.notes }}</p>
    <span class="badge {{ tool.pricing }}">{{ tool.pricing }}</span>
  </div>
  {% endfor %}
</div>
